name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  contrib-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Generate contribution graph
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_ACTOR: masak1yu
        run: python3 scripts/gen_contrib_graph.py

      - name: Commit contribution graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics.contrib.svg
          git diff --cached --quiet || git commit -m "chore: update contrib graph [skip ci]"
          git push

  stats-metrics:
    runs-on: ubuntu-latest
    needs: contrib-graph
    permissions:
      contents: write
    steps:
      - name: Stats metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.stats.svg
          base: header, activity, community, repositories
          plugin_habits: yes
          plugin_habits_facts: yes
          config_timezone: Asia/Tokyo
          config_display: large
          extras_css: |
            :root {
              --color-background: #282a36;
              --color-text-primary: #f8f8f2;
              --color-text-secondary: #6272a4;
              --color-border-default: #44475a;
              --color-accent: #bd93f9;
            }

  langs-metrics:
    runs-on: ubuntu-latest
    needs: stats-metrics
    permissions:
      contents: write
    steps:
      - name: Languages metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          config_timezone: Asia/Tokyo
          extras_css: |
            :root {
              --color-background: #282a36;
              --color-text-primary: #f8f8f2;
              --color-text-secondary: #6272a4;
              --color-border-default: #44475a;
              --color-accent: #bd93f9;
            }
