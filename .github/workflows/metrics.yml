name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日0時(UTC)に実行
  workflow_dispatch:       # 手動実行も可能
  push:
    branches: [master]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Stats card (commits, PRs, issues, stars)
      - name: Stats metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.stats.svg
          base: header, activity, community, repositories
          plugin_habits: yes
          plugin_habits_facts: yes
          config_timezone: Asia/Tokyo
          config_display: large
          extras_css: |
            :root {
              --color-background: #282a36;
              --color-text-primary: #f8f8f2;
              --color-text-secondary: #6272a4;
              --color-border-default: #44475a;
              --color-accent: #bd93f9;
            }

      # Top languages card
      - name: Languages metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          config_timezone: Asia/Tokyo
          extras_css: |
            :root {
              --color-background: #282a36;
              --color-text-primary: #f8f8f2;
              --color-text-secondary: #6272a4;
              --color-border-default: #44475a;
              --color-accent: #bd93f9;
            }

      # Profile summary card (isocalendar = contribution graph)
      - name: Isocalendar metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Tokyo
          extras_css: |
            :root {
              --color-background: #282a36;
              --color-text-primary: #f8f8f2;
              --color-text-secondary: #6272a4;
              --color-border-default: #44475a;
              --color-accent: #bd93f9;
            }
